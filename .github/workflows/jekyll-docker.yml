name: Jekyll Site CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    # 1. Install Ruby (Native environment, NO Docker permission errors)
    - name: Setup Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.3' 
        bundler-cache: true # Uses your Gemfile to install Jekyll automatically

    # 2. Inject Secret (Runner has full permission to create files)
    - name: Create Secret Data File
      env:
        ADMIN_PASS: ${{ secrets.ADMIN_PASSWORD }}
      run: |
        mkdir -p _data
        echo "password: \"$ADMIN_PASS\"" > _data/secrets.yml
        echo "✅ Secret injected successfully"

    # 3. Build the Site
    - name: Build with Jekyll
      run: bundle exec jekyll build

    # 4. (Optional) Archive the built site to download/view
    - name: Upload Build Artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: "_site"
